<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Vision App - Object & Face Detection</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --good: #10b981;
      --warn: #f59e0b;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1050px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .card {
      background: linear-gradient(160deg, var(--card), var(--card-2));
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.65rem;
    }

    p {
      margin: 6px 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .btn, select, input[type="file"] {
      background: #0b1220;
      color: var(--text);
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    .btn {
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: #0e7490;
      border-color: #06b6d4;
    }

    .btn.danger {
      background: #7f1d1d;
      border-color: #ef4444;
    }

    .status {
      margin-top: 8px;
      font-size: 0.93rem;
      color: var(--muted);
      min-height: 20px;
    }

    .status.good {
      color: var(--good);
    }

    .status.warn {
      color: var(--warn);
    }

    .stage-wrap {
      position: relative;
      width: 100%;
      max-width: 960px;
      margin-top: 12px;
      border: 1px dashed #475569;
      border-radius: 12px;
      overflow: hidden;
      background: #020617;
      min-height: 260px;
    }

    #stageCanvas {
      display: block;
      width: 100%;
      height: auto;
      background: #020617;
    }

    video, img {
      display: none;
    }

    .results {
      margin-top: 12px;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
      max-height: 220px;
      overflow: auto;
      font-size: 0.92rem;
      white-space: pre-wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .hint {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Computer Vision App</h1>
      <p>Detect <strong>objects</strong> and <strong>faces</strong> from uploaded images or live webcam in a single HTML file.</p>
      <div class="row">
        <span class="pill">Client-side only</span>
        <span class="pill">No backend needed</span>
        <span class="pill">Works in modern browsers</span>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <label for="modeSelect">Detection Mode:</label>
        <select id="modeSelect">
          <option value="object">Object Detection (COCO-SSD)</option>
          <option value="face">Face Detection (face-api)</option>
        </select>
        <button class="btn primary" id="loadModelsBtn">Load Models</button>
      </div>

      <div class="row">
        <input type="file" id="imageInput" accept="image/*" />
        <button class="btn" id="detectImageBtn">Detect on Image</button>
      </div>

      <div class="row">
        <button class="btn" id="startCamBtn">Start Webcam</button>
        <button class="btn danger" id="stopCamBtn">Stop Webcam</button>
      </div>

      <div id="status" class="status">Models not loaded.</div>
      <div class="hint">For webcam access, allow camera permission in your browser.</div>

      <div class="stage-wrap">
        <video id="video" autoplay muted playsinline></video>
        <img id="image" alt="Uploaded" />
        <canvas id="stageCanvas"></canvas>
      </div>

      <div id="results" class="results">Detection results will appear here.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <script>
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const modeSelect = document.getElementById("modeSelect");
    const imageInput = document.getElementById("imageInput");
    const detectImageBtn = document.getElementById("detectImageBtn");
    const loadModelsBtn = document.getElementById("loadModelsBtn");
    const startCamBtn = document.getElementById("startCamBtn");
    const stopCamBtn = document.getElementById("stopCamBtn");
    const videoEl = document.getElementById("video");
    const imageEl = document.getElementById("image");
    const canvas = document.getElementById("stageCanvas");
    const ctx = canvas.getContext("2d");

    let cocoModel = null;
    let faceReady = false;
    let stream = null;
    let detectLoopId = null;
    let activeSource = null; // "image" or "video"

    function setStatus(message, level = "") {
      statusEl.textContent = message;
      statusEl.className = "status" + (level ? " " + level : "");
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function setCanvasSize(w, h) {
      canvas.width = w;
      canvas.height = h;
    }

    function drawBase(source, width, height) {
      setCanvasSize(width, height);
      ctx.drawImage(source, 0, 0, width, height);
    }

    function drawLabelBox(x, y, w, h, label, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);

      const pad = 4;
      ctx.font = "14px Arial";
      const textW = ctx.measureText(label).width;
      const textH = 16;
      const lx = x;
      const ly = Math.max(0, y - textH - 2);

      ctx.fillStyle = color;
      ctx.fillRect(lx, ly, textW + pad * 2, textH + 2);
      ctx.fillStyle = "#0b1220";
      ctx.fillText(label, lx + pad, ly + textH - 2);
    }

    async function loadModels() {
      try {
        setStatus("Loading TensorFlow backend...", "warn");
        await tf.ready();

        setStatus("Loading COCO-SSD model...", "warn");
        cocoModel = await cocoSsd.load();

        setStatus("Loading face-api model...", "warn");
        // Tiny face detector model from public CDN.
        await faceapi.nets.tinyFaceDetector.loadFromUri(
          "https://justadudewhohacks.github.io/face-api.js/models"
        );
        faceReady = true;

        setStatus("Models loaded successfully.", "good");
      } catch (error) {
        console.error(error);
        setStatus("Failed to load models. Check internet/CDN access.", "warn");
      }
    }

    async function detectObjectsOn(source, width, height) {
      if (!cocoModel) {
        setStatus("Please load models first.", "warn");
        return [];
      }
      const predictions = await cocoModel.detect(source);
      drawBase(source, width, height);
      predictions.forEach((p) => {
        const [x, y, w, h] = p.bbox;
        const label = `${p.class} (${(p.score * 100).toFixed(1)}%)`;
        drawLabelBox(x, y, w, h, label, "#22d3ee");
      });
      return predictions;
    }

    async function detectFacesOn(source, width, height) {
      if (!faceReady) {
        setStatus("Please load models first.", "warn");
        return [];
      }

      const options = new faceapi.TinyFaceDetectorOptions({
        inputSize: 416,
        scoreThreshold: 0.4
      });

      const detections = await faceapi.detectAllFaces(source, options);
      drawBase(source, width, height);
      detections.forEach((d, idx) => {
        const box = d.box;
        const label = `Face ${idx + 1} (${(d.score * 100).toFixed(1)}%)`;
        drawLabelBox(box.x, box.y, box.width, box.height, label, "#10b981");
      });
      return detections;
    }

    function formatResults(mode, detections) {
      if (!detections || detections.length === 0) {
        return "No detections found.";
      }

      if (mode === "object") {
        return detections
          .map((d, i) => {
            const [x, y, w, h] = d.bbox.map((v) => v.toFixed(1));
            return `${i + 1}. ${d.class} | confidence: ${(d.score * 100).toFixed(1)}% | bbox: [${x}, ${y}, ${w}, ${h}]`;
          })
          .join("\n");
      }

      return detections
        .map((d, i) => {
          const b = d.box;
          return `${i + 1}. face | confidence: ${(d.score * 100).toFixed(1)}% | bbox: [${b.x.toFixed(1)}, ${b.y.toFixed(1)}, ${b.width.toFixed(1)}, ${b.height.toFixed(1)}]`;
        })
        .join("\n");
    }

    async function detectOnImage() {
      if (!imageEl.src) {
        setStatus("Upload an image first.", "warn");
        return;
      }

      if (!imageEl.complete) {
        await new Promise((resolve) => {
          imageEl.onload = () => resolve();
        });
      }

      activeSource = "image";
      const width = imageEl.naturalWidth;
      const height = imageEl.naturalHeight;
      const mode = modeSelect.value;

      try {
        setStatus(`Running ${mode} detection on image...`, "warn");
        const detections = mode === "object"
          ? await detectObjectsOn(imageEl, width, height)
          : await detectFacesOn(imageEl, width, height);

        resultsEl.textContent = formatResults(mode, detections);
        setStatus(`Image detection complete. Found ${detections.length} result(s).`, "good");
      } catch (error) {
        console.error(error);
        setStatus("Detection failed. See browser console for details.", "warn");
      }
    }

    async function startWebcam() {
      try {
        stopWebcam();
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        videoEl.srcObject = stream;
        await videoEl.play();
        activeSource = "video";
        setStatus("Webcam started. Running live detection...", "good");
        runLiveDetection();
      } catch (error) {
        console.error(error);
        setStatus("Could not access webcam. Check permissions.", "warn");
      }
    }

    function stopWebcam() {
      if (detectLoopId) {
        cancelAnimationFrame(detectLoopId);
        detectLoopId = null;
      }

      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
        stream = null;
      }

      videoEl.srcObject = null;
      if (activeSource === "video") {
        activeSource = null;
        clearCanvas();
      }
      setStatus("Webcam stopped.");
    }

    async function runLiveDetection() {
      const mode = modeSelect.value;

      const tick = async () => {
        if (!stream || videoEl.readyState < 2) {
          detectLoopId = requestAnimationFrame(tick);
          return;
        }

        const width = videoEl.videoWidth || 640;
        const height = videoEl.videoHeight || 480;

        try {
          const detections = mode === "object"
            ? await detectObjectsOn(videoEl, width, height)
            : await detectFacesOn(videoEl, width, height);
          resultsEl.textContent = formatResults(mode, detections);
        } catch (error) {
          console.error(error);
        }

        detectLoopId = requestAnimationFrame(tick);
      };

      detectLoopId = requestAnimationFrame(tick);
    }

    imageInput.addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) {
        return;
      }
      const url = URL.createObjectURL(file);
      imageEl.src = url;
      imageEl.onload = () => {
        activeSource = "image";
        drawBase(imageEl, imageEl.naturalWidth, imageEl.naturalHeight);
        setStatus("Image loaded. Click 'Detect on Image'.", "good");
      };
    });

    detectImageBtn.addEventListener("click", detectOnImage);
    loadModelsBtn.addEventListener("click", loadModels);
    startCamBtn.addEventListener("click", startWebcam);
    stopCamBtn.addEventListener("click", stopWebcam);
    modeSelect.addEventListener("change", () => {
      if (activeSource === "video" && stream) {
        if (detectLoopId) {
          cancelAnimationFrame(detectLoopId);
          detectLoopId = null;
        }
        runLiveDetection();
      }
    });
  </script>
</body>
</html>
